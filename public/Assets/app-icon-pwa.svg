<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="512" height="512" viewBox="0 0 512 512">
	<defs>
		<clipPath id="iconClip">
			<rect width="512" height="512" rx="112"/>
		</clipPath>
	</defs>
	<g clip-path="url(#iconClip)">
		<!-- Fondo opaco (evita blanco del launcher donde el PNG tiene alpha) -->
		<rect width="512" height="512" fill="#120005"/>
		<!-- Toda la imagen visible, lo m·s grande posible dentro del cuadrado -->
		<image
			xlink:href="/Assets/logo-mobil.png"
			href="/Assets/logo-mobil.png"
			width="512"
			height="512"
			preserveAspectRatio="xMidYMid meet"
		/>
	</g>
</svg>
