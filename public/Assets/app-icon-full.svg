<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="512" height="512" viewBox="0 0 512 512">
	<defs>
		<linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" stop-color="#9f1328"/>
			<stop offset="45%" stop-color="#5c0814"/>
			<stop offset="100%" stop-color="#120005"/>
		</linearGradient>
	</defs>
	<!-- Fondo opaco completo (evita que el launcher pinte blanco donde había alpha) -->
	<rect width="512" height="512" rx="112" fill="url(#bg)"/>
	<!-- Logo centrado (safe zone maskable ~66%; dejamos margen para recortes circulares) -->
	<image
		xlink:href="/Assets/logo-mobil.png"
		href="/Assets/logo-mobil.png"
		x="56"
		y="56"
		width="400"
		height="400"
		preserveAspectRatio="xMidYMid meet"
	/>
</svg>
